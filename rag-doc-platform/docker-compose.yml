services:
  mongo:
    image: mongo:7.0
    container_name: rag-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rag-doc-platform
    volumes:
      - mongo-data:/data/db
    networks:
      - rag-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=["*"]
    networks:
      - rag-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - ./client/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped

  frontend2:
    build:
      context: ./client2
      dockerfile: Dockerfile
    container_name: rag-frontend2
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE=/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client2/src:/app/src
      - ./client2/public:/app/public
      - ./client2/index.html:/app/index.html
      - ./client2/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/rag-doc-platform
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - mongo
      - chromadb
    networks:
      - rag-network
    restart: unless-stopped

  langchain-rag:
    build:
      context: ./python-rag
      dockerfile: Dockerfile
    container_name: rag-langchain-rag
    ports:
      - "8001:8001"
    env_file:
      - ./python-rag/.env
    environment:
      - OPENAI_API_KEY
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - COLLECTION_NAME=documents
      - EMBEDDING_MODEL=text-embedding-3-small
      - CHAT_MODEL=gpt-3.5-turbo
    depends_on:
      - chromadb
    networks:
      - rag-network
    restart: unless-stopped

  nginx-proxy:
    image: nginx:alpine
    container_name: rag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  nginx-logs:
    driver: local
